<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MP Eagle Wood Craft</title>

<!-- Google Font -->
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&display=swap" rel="stylesheet">

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Cinzel', serif;
}

/* 🔥 LOADER STYLE */
#loader {
  position: fixed;
  width: 100%;
  height: 100%;
  background: #000;
  display: flex;
  justify-content: center;
  align-items: center;
  flex-direction: column;
  z-index: 9999;
}

#loader img {
  width: 160px;
  animation: zoom 2s ease-in-out;
  filter: drop-shadow(0 0 20px gold);
}

#loader h1 {
  color: gold;
  margin-top: 15px;
  letter-spacing: 3px;
  animation: fadeIn 2s ease-in-out;
}

/* Animations */
@keyframes zoom {
  0% { transform: scale(0.5); opacity: 0; }
  100% { transform: scale(1); opacity: 1; }
}

@keyframes fadeIn {
  0% { opacity: 0; }
  100% { opacity: 1; }
}

/* 🌐 MAIN WEBSITE */
body {
  background: #111;
  color: #fff;
}

header {
  text-align: center;
  padding: 80px 20px;
}

header h1 {
  font-size: 40px;
  color: gold;
}

header p {
  margin-top: 10px;
  color: #ccc;
}

section {
  padding: 50px;
  text-align: center;
}

.btn {
  margin-top: 20px;
  padding: 10px 25px;
  background: gold;
  color: #000;
  text-decoration: none;
  border-radius: 5px;
  font-weight: bold;
}

</style>
</head>

<body>

<!-- 🔥 LOGO INTRO -->
<div id="loader">
  <img src="logo.png" alt="Logo">
  <h1>MP EAGLE WOOD CRAFT</h1>
</div>

<!-- 🌐 WEBSITE CONTENT -->
<header>
  <h1>MP Eagle Wood Craft</h1>
  <p>Premium Wooden Creations</p>
  <a href="#" class="btn">Explore Products</a>
</header>

<section>
  <h2>Our Craft</h2>
  <p>We create high-quality wooden products with precision and passion.</p>
</section>

<!-- ✅ SCRIPT -->
<script>
window.onload = function() {
  setTimeout(function() {
    document.getElementById("loader").style.display = "none";
  }, 2500);
};
</script>

</body>
</html>
