<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MP Eagle Wood Craft</title>

  <!-- ✅ CSS goes inside HEAD -->
  <style>
    #loader {
      position: fixed;
      width: 100%;
      height: 100%;
      background: #000;
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 9999;
    }

    #loader img {
      width: 150px;
      animation: zoom 2s ease-in-out;
    }

    @keyframes zoom {
      0% { transform: scale(0.5); opacity: 0; }
      100% { transform: scale(1); opacity: 1; }
    }
  </style>

</head>

<body>

  <!-- ✅ 1. PUT LOADER AT VERY TOP OF BODY -->
  <div id="loader">
    <img src="https://github.com/muthug3308-afk/mpeaglewoodcraft/blob/main/logo.png.jpg" alt="Logo">
  </div>

  <!-- ✅ 2. YOUR WEBSITE CONTENT BELOW -->
  <h1>Welcome to MP Eagle Wood Craft</h1>
  <p>Your premium wooden products website</p>

  <!-- ✅ 3. JAVASCRIPT BEFORE CLOSING BODY -->
  <script>
    window.onload = function() {
      setTimeout(function() {
        document.getElementById("loader").style.display = "none";
      }, 2000);
    };
  </script>

</body>
</html>
