<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MP Eagle Wood Craft</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #111;
  color: white;
}

/* Navbar */
nav {
  display: flex;
  justify-content: space-between;
  padding: 15px 30px;
  background: black;
}
nav h1 {
  color: gold;
}
nav a {
  color: white;
  text-decoration: none;
  margin-left: 20px;
}

/* Hero */
.hero {
  text-align: center;
  padding: 80px 20px;
}
.hero h2 {
  font-size: 40px;
  color: gold;
}
.hero p {
  color: #ccc;
}

/* Products */
.products {
  padding: 40px;
  text-align: center;
}
.product-box {
  display: inline-block;
  margin: 20px;
  background: #222;
  padding: 15px;
  border-radius: 10px;
  transition: 0.3s;
}
.product-box:hover {
  transform: scale(1.05);
}
.product-box img {
  width: 200px;
  border-radius: 10px;
}

/* Contact */
.contact {
  text-align: center;
  padding: 40px;
}
button {
  padding: 10px 20px;
  background: green;
  border: none;
  color: white;
  border-radius: 5px;
  cursor: pointer;
}
</style>
</head>

<body>

<!-- Navbar -->
<nav>
  <h1>MP Eagle 🦅</h1>
  <div>
    <a href="#">Home</a>
    <a href="#">Products</a>
    <a href="#">Contact</a>
  </div>
</nav>

<!-- Hero Section -->
<section class="hero">
  <h2>MP Eagle Wood Craft</h2>
  <p>Premium Handmade Wooden Products</p>
</section>

<!-- Products -->
<section class="products">
  <h2>Our Products</h2>

  <div class="product-box">
    <img src="https://via.placeholder.com/200">
    <p>Wooden Chair - ₹1500</p>
  </div>

  <div class="product-box">
    <img src="https://via.placeholder.com/200">
    <p>Wooden Table - ₹2500</p>
  </div>

</section>

<!-- Contact -->
<section class="contact">
  <h2>Contact Us</h2>
  <a href="https://wa.me/91YOURNUMBER">
    <button>Order on WhatsApp</button>
  </a>
</section>

</body>
</html>
