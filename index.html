<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MP Eagle Wood Craft</title>

<!-- Google Font -->
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&display=swap" rel="stylesheet">

<style>
#loader {
  position: fixed;
  width: 100%;
  height: 100%;
  background: radial-gradient(circle, #000 60%, #111);
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  z-index: 9999;
}

.eagle {
  width: 170px;
  filter: drop-shadow(0 0 25px gold);
  animation: fly 3s ease-in-out infinite;
}

#loader h1 {
  color: gold;
  margin-top: 20px;
  letter-spacing: 4px;
}

@keyframes fly {
  0% { transform: translateY(30px) scale(0.9); opacity: 0; }
  50% { transform: translateY(0px) scale(1.1); opacity: 1; }
  100% { transform: translateY(-20px) scale(1); }
}

</style>
</head>

<body>
  

<!-- 🔥 LOADING SCREEN -->
<div id="loader">
  <img src="logo.png" class="eagle" alt="Logo">
  <h1>MP EAGLE WOOD CRAFT</h1>
</div>

<!-- 🔥 LOGO INTRO -->
<div id="loader">
  <img src="logo.png" alt="Logo">
  <h1>MP EAGLE WOOD CRAFT</h1>
</div>

<!-- 🌐 WEBSITE CONTENT -->
<header>
  <h1>MP Eagle Wood Craft</h1>
  <p>Premium Wooden Creations</p>
  <a href="#" class="btn">Explore Products</a>
</header>

<section>
  <h2>Our Craft</h2>
  <p>We create high-quality wooden products with precision and passion.</p>
</section>

<!-- ✅ SCRIPT -->
<script>
window.onload = function() {
  setTimeout(function() {
    document.getElementById("loader").style.display = "none";
  }, 3000);
};
</script>
  <script>
window.onload = function () {
  setTimeout(() => {
    document.getElementById("loader").style.display = "none";
  }, 3000);
};
</script>

</body>
</html>
