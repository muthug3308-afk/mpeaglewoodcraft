<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MP Eagle Wood Craft</title>

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Cormorant+Garamond&display=swap" rel="stylesheet">

<style>
* { margin:0; padding:0; box-sizing:border-box; }

body {
  background:#0b0b0b;
  color:#f5ead0;
  font-family:'Cormorant Garamond', serif;
}

/* NAV */
nav {
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:20px 5%;
  background:#111;
}

.nav-name {
  font-family:'Cinzel', serif;
  letter-spacing:3px;
  color:#c9a84c;
}

/* HERO */
#hero {
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  text-align:center;
}

.hero-title {
  font-family:'Cinzel', serif;
  font-size:50px;
  color:#ffd700;
}

.hero-sub {
  margin-top:10px;
  color:#ccc;
}

/* BUTTON */
.btn {
  margin-top:20px;
  display:inline-block;
  padding:12px 25px;
  background:#c9a84c;
  color:black;
  text-decoration:none;
  font-family:'Cinzel', serif;
}

.btn:hover {
  background:#ffd700;
}

/* PRODUCTS */
#products {
  padding:60px 5%;
  background:#111;
}

.grid {
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
  gap:20px;
}

.card {
  background:#1a1a1a;
  padding:20px;
  text-align:center;
}

.card h3 {
  margin-top:10px;
  color:#c9a84c;
}

/* CONTACT */
#contact {
  padding:60px 5%;
  text-align:center;
}

.btn-instagram {
  display:inline-block;
  margin-top:20px;
  padding:12px 25px;
  background:#c9a84c;
  color:black;
  text-decoration:none;
}
</style>
</head>

<body>

<!-- NAV -->
<nav>
  <div class="nav-name">MP EAGLE WOOD CRAFT</div>
</nav>

<!-- HERO -->
<section id="hero">
  <div>
    <h1 class="hero-title">EAGLE WOOD CRAFT</h1>
    <p class="hero-sub">Premium handmade wooden products</p>
    <a href="#products" class="btn">VIEW PRODUCTS</a>
  </div>
</section>

<!-- PRODUCTS -->
<section id="products">
  <h2 style="text-align:center; margin-bottom:30px;">Our Products</h2>

  <div class="grid">
    <div class="card">
      <h3>Wooden Table</h3>
      <p>Strong & premium finish</p>
    </div>

    <div class="card">
      <h3>Wall Frame</h3>
      <p>Modern handcrafted design</p>
    </div>

    <div class="card">
      <h3>Wood Decor</h3>
      <p>Luxury interior style</p>
    </div>
  </div>
</section>

<!-- CONTACT -->
<section id="contact">
  <h2>Contact Us</h2>
  <p>Order your custom wood designs</p>

  <a href="https://instagram.com" class="btn-instagram">
    Visit Instagram
  </a>
</section>

</body>
</html>
